<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 151 139" preserveAspectRatio="xMidYMid meet" aria-label="Australia with location marker at Perth" role="img">
  <style>
    /* --- MAP CONTROLS --- */
    /* Controls the fill, outline color, thickness, and transparency */
    .oa-au-map {
      fill: #E5E4E4;
      fill-opacity: 0.1;     /* Controls ONLY the fill transparency */
      stroke: #ffffff;
      stroke-width: 0.3px;
      stroke-opacity: 0.8;   /* Controls ONLY the outline transparency */
    }

    /* --- DOT CONTROLS --- */
    .oa-perth-core {
      fill: #E23636;
    }
    .oa-perth-halo {
      fill: #E23636;
      transform-box: fill-box;
      transform-origin: center;
      animation: oa-perth-pulse 1.8s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }

    /* --- ANIMATION --- */
    @keyframes oa-perth-pulse {
      0%   { transform: scale(0.9); opacity: 0.55; }
      80%  { opacity: 0; }
      100% { transform: scale(2.4); opacity: 0; }
    }

    /* Accessibility: Pauses animation for users with motion sensitivity */
    @media (prefers-reduced-motion: reduce) {
      .oa-perth-halo { animation: none; opacity: 0.25; transform: scale(1.4); }
    }
  </style>

